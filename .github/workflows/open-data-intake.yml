name: Open Data Intake

on:
  push:
    branches:
      - main
    paths:
      - 'data/trust-centers.json'
      - 'data/stats.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-intake-issue:
    if: ${{ !contains(github.event.head_commit.message, '[skip-intake]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure intake token is configured
        env:
          INTAKE_TOKEN: ${{ secrets.TRUSTLISTS_MAIN_REPO_TOKEN }}
        run: |
          if [ -z "$INTAKE_TOKEN" ]; then
            echo "::error::Missing TRUSTLISTS_MAIN_REPO_TOKEN secret."
            exit 1
          fi

      - name: Create intake issue in TrustLists
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRUSTLISTS_MAIN_REPO_TOKEN }}
          script: |
            const owner = 'trustlists';
            const repo = 'TrustLists';
            const sourceRepo = context.repo.repo;
            const sourceOwner = context.repo.owner;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha;
            const shortSha = sha.substring(0, 7);
            const compareUrl = context.payload.compare || `https://github.com/${sourceOwner}/${sourceRepo}/commits/${branch}`;
            const sourceCommitUrl = `https://github.com/${sourceOwner}/${sourceRepo}/commit/${sha}`;

            const title = `Open-data intake: review ${sourceRepo}@${shortSha}`;
            const body = [
              'A data update was merged into the open dataset repository and should be reviewed for promotion into the main TrustLists repo.',
              '',
              '## Source update',
              `- Repository: \`${sourceOwner}/${sourceRepo}\``,
              `- Branch: \`${branch}\``,
              `- Commit: ${sourceCommitUrl}`,
              `- Compare: ${compareUrl}`,
              '',
              '## Suggested review checklist',
              '- [ ] Validate trust-center URL changes',
              '- [ ] Confirm platform classifications',
              '- [ ] Confirm no duplicate canonical entries',
              '- [ ] Open PR to `trustlists/TrustLists` if approved',
            ].join('\n');

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
            });
