name: Validate Data

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('data/trust-centers.json','utf8')); console.log('trust-centers.json OK')"
          node -e "JSON.parse(require('fs').readFileSync('data/stats.json','utf8')); console.log('stats.json OK')"
